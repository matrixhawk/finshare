name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:  # 允许手动触发
    inputs:
      version:
        description: '版本号 (例如: 0.1.2, 留空则自动生成)'
        required: false
        type: string
      version_type:
        description: '自动版本类型 (当version为空时生效)'
        required: false
        type: choice
        options:
          - patch  # 0.1.0 -> 0.1.1
          - minor  # 0.1.0 -> 0.2.0
          - major  # 0.1.0 -> 1.0.0
        default: patch

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # 获取完整历史，用于版本号生成

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Determine version
      id: version
      run: |
        # 直接从文件读取版本号 (兼容 macOS 和 Linux)
        CURRENT_VERSION=$(grep '__version__' finshare/__version__.py | sed 's/.*"\(.*\)".*/\1/')
        echo "Current version: $CURRENT_VERSION"

        # 如果手动指定了版本号
        if [ -n "${{ inputs.version }}" ]; then
          NEW_VERSION="${{ inputs.version }}"
          echo "Using manual version: $NEW_VERSION"
        # 如果是 release 触发，使用 tag 名称
        elif [ "${{ github.event_name }}" = "release" ]; then
          NEW_VERSION="${{ github.event.release.tag_name }}"
          # 移除 v 前缀（如果有）
          NEW_VERSION="${NEW_VERSION#v}"
          echo "Using release tag: $NEW_VERSION"
        # 否则自动递增版本号
        else
          IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"
          case "${{ inputs.version_type }}" in
            major)
              NEW_VERSION="$((major + 1)).0.0"
              ;;
            minor)
              NEW_VERSION="${major}.$((minor + 1)).0"
              ;;
            patch|*)
              NEW_VERSION="${major}.${minor}.$((patch + 1))"
              ;;
          esac
          echo "Auto-generated version: $NEW_VERSION"
        fi

        echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "Final version: $NEW_VERSION"

    - name: Update version files
      run: |
        # 更新 finshare/__version__.py
        sed -i "s/__version__ = \".*\"/__version__ = \"${{ steps.version.outputs.version }}\"/" finshare/__version__.py

        # 更新 pyproject.toml
        sed -i "s/version = \".*\"/version = \"${{ steps.version.outputs.version }}\"/" pyproject.toml

        cat finshare/__version__.py
        echo "---"
        grep "^version" pyproject.toml

    - name: Build package
      run: python -m build

    - name: Check package
      run: twine check dist/*

    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: twine upload dist/*

    - name: Commit version update
      if: github.event_name == 'workflow_dispatch'
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add finshare/__version__.py
        git commit -m "chore: bump version to ${{ steps.version.outputs.version }}" || echo "No changes to commit"
        git push || echo "Nothing to push"
